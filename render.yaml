services:
  - type: web
    name: pokedex-api
    runtime: python
    rootDir: Projects/Pokedex/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ORIGINS
        value: https://your-pokedex-frontend.onrender.com

  - type: web
    name: pokedex-frontend
    runtime: node
    rootDir: Projects/Pokedex/frontend/pokedex-react
    buildCommand: npm ci; npm run build
    startCommand: npx serve -s build -l $PORT
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: REACT_APP_API_URL
        value: https://your-pokedex-api.onrender.com
