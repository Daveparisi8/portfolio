services:
  - type: web
    name: pokedex-api
    runtime: python
    rootDir: Projects/Pokedex/backend
    plan: free 
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ORIGINS
        value: https://your-pokedex-frontend.onrender.com

  - type: static  
    name: pokedex-frontend
    rootDir: Projects/Pokedex/frontend/pokedex-react
    plan: free 
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_URL
        value: https://your-pokedex-api.onrender.com